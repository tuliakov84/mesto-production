<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./assets/logo-CMFODZqH.svg">
  <title>Mesto</title>
  <script type="module" crossorigin src="./assets/index-ClAk7Hwk.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-F9gjbUa2.css">
</head>

<body class="page">
  <div class="page__content">

    <header class="header page__section">
      <img src="./assets/logo-CMFODZqH.svg" alt="Логотип проекта Место" class="logo header__logo">
    </header>

    <main class="content">
      <section class="profile page__section">
        <div class="profile__image">
          <img src="" alt="Аватар пользователя" class="profile__avatar">
          <button type="button" class="profile__avatar-edit" aria-label="Редактировать аватар"></button>
        </div>
        <div class="profile__info">
          <h1 class="profile__title"></h1>
          <button type="button" class="profile__edit-button" aria-label="Редактировать профиль"></button>
          <p class="profile__description"></p>
        </div>
        <button type="button" class="profile__add-button" aria-label="Добавить карточку"></button>
      </section>

      <section class="places page__section">
        <ul class="places__list"></ul>
      </section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">© 2026 Mesto Russia</p>
    </footer>

    <div class="popup popup_type_edit popup_is-animated" id="edit-profile-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Редактировать профиль</h3>
        <form class="popup__form popup__form_type_edit" name="edit-profile" novalidate>
          <input type="text" name="name" class="popup__input popup__input_type_name" placeholder="Имя" required
            minlength="2" maxlength="40" pattern="^[a-zA-Zа-яА-ЯёЁ\s\-]+$"
            data-error-message="Разрешены только латиница, кириллица, пробелы и дефисы">
          <span class="popup__error name-input-error"></span>

          <input type="text" name="description" class="popup__input popup__input_type_description" placeholder="О себе"
            required minlength="2" maxlength="200">
          <span class="popup__error description-input-error"></span>

          <button type="submit" class="button popup__button popup__button_type_save">Сохранить</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_new-card popup_is-animated" id="new-card-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Новое место</h3>
        <form class="popup__form popup__form_type_new-card" name="new-place" novalidate>
          <input type="text" name="place-name" class="popup__input popup__input_type_card-name" placeholder="Название"
            required minlength="2" maxlength="30" pattern="^[a-zA-Zа-яА-ЯёЁ\s\-]+$"
            data-error-message="Разрешены только латиница, кириллица, пробелы и дефисы">
          <span class="popup__error place-name-input-error"></span>

          <input type="url" name="link" class="popup__input popup__input_type_url" placeholder="Ссылка на картинку"
            required>
          <span class="popup__error link-input-error"></span>

          <button type="submit" class="button popup__button popup__button_type_create">Создать</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_edit-avatar popup_is-animated" id="edit-avatar-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Обновить аватар</h3>
        <form class="popup__form popup__form_type_edit-avatar" name="edit-avatar" novalidate>
          <input type="url" name="avatar" class="popup__input popup__input_type_avatar"
            placeholder="Ссылка на новый аватар" required>
          <span class="popup__error avatar-input-error"></span>

          <button type="submit" class="button popup__button popup__button_type_save">Сохранить</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_remove-card popup_is-animated" id="remove-card-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Вы уверены?</h3>
        <form class="popup__form popup__form_type_remove-card" name="remove-card" novalidate>
          <button type="submit" class="button popup__button popup__button_type_confirm">Да</button>
        </form>
      </div>
    </div>

    <div class="popup popup_type_image popup_is-animated" id="image-popup">
      <div class="popup__content popup__content_type_image">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <img src="" alt="" class="popup__image">
        <p class="popup__caption"></p>
      </div>
    </div>

    <div class="popup popup_type_info popup_is-animated" id="info-popup">
      <div class="popup__content">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Информация о карточке</h3>
        <ul class="popup__info-list"></ul>
      </div>
    </div>

  </div>

  <template id="card-template">
    <li class="places__item card">
      <button class="card__control-button card__control-button_type_info" type="button" aria-label="Информация"></button>
      <img class="card__image" src="" alt="">
      <button type="button" class="card__delete-button" aria-label="Удалить"></button>
      <div class="card__description">
        <h2 class="card__title"></h2>
        <div class="card__like-container">
          <button type="button" class="card__like-button" aria-label="Лайк"></button>
          <span class="card__like-count"></span>
        </div>
      </div>
    </li>
  </template>

  <template id="popup-info-definition-template">
    <li class="popup__info-item">
      <span class="popup__info-label"></span>
      <span class="popup__info-value"></span>
    </li>
  </template>

  <template id="popup-info-user-preview-template">
    <li class="popup__info-item popup__info-item_type_user">
      <img src="" alt="" class="popup__info-user-avatar">
      <span class="popup__info-user-name"></span>
    </li>
  </template>

</body>
</html>
